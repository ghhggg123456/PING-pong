<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/design/icon.png">
    <title>PING-pong</title>
</head>
<body>
    <main>
            <section>
                <h1>PING-pong</h1>
                <p>Your score: <span id="money">100</span>$</p>
            </section>
            <button id="play">Play</button>
            <button id="store">Store</button>
            <button id="exit">Exit</button>
    </main>

    <script src="script.js"></script>
    <script>
        const play = document.getElementById('play');
        const store = document.getElementById('store');
        const exit = document.getElementById('exit');
        play.addEventListener('click', function(){window.location.replace('pages/game.html'); })
        store.addEventListener('click', function(){window.location.replace('pages/store.html')})
        exit.addEventListener('click', function(){window.close()})
    </script>
</body>
</html>
