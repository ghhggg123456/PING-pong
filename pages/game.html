<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/design/icon.png">
    <title>Ping-Pong</title>
    <style>
        body {
            padding: 0px;
            height: 100%;
            width: 100%;
        }

        #plate {
            background-color: rgb(255, 255, 255);
            margin: 0vh;
            height: 10vh;
            width: 1vh;
            position: relative;
            top: 0;
            left: 0;
        }

        #field {
            box-sizing: border-box;
            position: relative;
            top: 0px;
            left: 0px;
            display: flex;
            flex-direction: row-reverse;
            margin: 0px;
            padding: 0px;
            background-color: rgb(0, 0, 0, 0.7);
            font-family: 'Consolas';
            height: 90%;
            width: 90%;
            text-align: center;
            border-style: groove;
            border-color: white red white white;
            
        }
    </style>
</head>
<body>
    <div id="field"><div id="plate"></div></div>
    <script>
        let speed = 20;
        const plate = document.getElementById('plate');
        const field = document.getElementById('field');
        const fieldRect = field.getBoundingClientRect();
        const plateHeight = parseInt(getComputedStyle(plate).height);
        const minTop = 0;
        const maxTop = field.clientHeight - plateHeight;
        document.addEventListener('keydown', function(event) {
            if (event.code === 'ArrowUp') {
                event.preventDefault();
                let newTop = plate.offsetTop - speed;
                if (newTop >= minTop) {plate.style.top = newTop + 'px';} else {plate.style.top = minTop + 'px';}
            }

            if (event.code === 'ArrowDown') {
                event.preventDefault();
                let newTop = plate.offsetTop + speed;
                if (newTop <= maxTop) {plate.style.top = newTop + 'px';} else {plate.style.top = maxTop + 'px';}
            }
        });
    </script>
</body>
</html>
