    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./styles.css">
        <link rel="icon" href="./spec/icon.png">
        <title>Ping-Pong</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                padding: 0px;
                height: 100%;
                width: 100%;
            }

            button {
                width: 90%;
            }

            #plate {
                background-color: rgb(255, 255, 255);
                margin: 0vh;
                height: 10vh;
                width: 1vh;
                position: absolute;
                top: 0;
                left: calc(100%-1vh);
            }

            #ball {
                position: absolute;
                top: 50%;
                left: 50%;
                background-color: white;
                width: 2vh;
                height: 2vh;
                color:white;
                border-radius: 1vh;
            }

            #field {
                box-sizing: border-box;
                position: relative;
                top: 0px;
                left: 0px;
                display: flex;
                flex-direction: row-reverse;
                margin: 0px;
                padding: 0px;
                background-color: rgb(0, 0, 0, 0.7);
                font-family: 'Consolas';
                height: 90%;
                width: 90%;
                text-align: center;
                border-style: groove;
                border-color: white red white white;
                
            }
        </style>
    </head>
    <body>
        <div id="field">
            <div id="plate"></div>
            <div id="ball"></div>
        </div>
        <button>Finish (Score: <span>?</span>$)</button>
        <script src="./script.js"></script>
        <script>
            const finish = document.querySelector('button')
            finish.addEventListener('click', function(){window.location.replace('./index.html')})

            const field = document.querySelector('#field');
            const plate = document.querySelector('#plate');
            let ball = document.querySelector('#ball')
            const PLATE_SPEED = 10
            const BALL_SPEED = 10

            document.addEventListener('keydown', function(event) {
                if (event.key == 's' && plate.offsetTop<=parseInt(field.clientHeight)-plate.clientHeight) {
                    plate.style.top = `${plate.offsetTop+PLATE_SPEED}px`
                }
                if (event.key == 'w' && plate.offsetTop>0) {
                    plate.style.top = `${plate.offsetTop-PLATE_SPEED}px`
                }
                console.log(`${ball} ${plate.offsetTop}`)
            })

            function main(){

                let angle = Math.round(Math.random()*360);
                
                function newBall() {
                    let b = document.createElement('div')
                    b.setAttribute('id', 'ball')
                    b.style.top = '50%';
                    b.style.left = '50%';
                    field.appendChild(b);
                    newBallAngle()
                }
                
                function newBallAngle(side=null) {
                    if (side == 'up') {angle = Math.round(Math.random()*180)+180};
                    if (side == 'right') {angle = Math.round(Math.random()*180)+90};
                    if (side == 'left') {Math.round(Math.random()) ? angle = Math.round(Math.random()*90) : angle = 270+Math.round(Math.random()*90)};
                    if (side == 'down') {angle = Math.round(Math.random()*180)}
                    if (side == null) {angle = Math.round(Math.random()*360)}
                };

                function checkCollision() {
                    ball = document.querySelector('#ball')

                    console.log(parseInt(plate.style.top)-parseInt(ball.style.top))
                    if (parseInt(ball.style.top)<=0) {newBallAngle('up')}
                    if (parseInt(ball.style.left)<=0) {newBallAngle('left')}
                    if (parseInt(ball.style.top)>field.clientHeight-ball.clientHeight) {newBallAngle('down')}
                    if (parseInt(ball.style.left) >= field.clientWidth - plate.clientWidth - ball.clientWidth && 
                        parseInt(ball.style.top) + ball.clientHeight >= parseInt(plate.style.top) && 
                        parseInt(ball.style.top) <= parseInt(plate.style.top) + plate.clientHeight) {
                        newBallAngle('right'); 
                        localStorage.setItem('score', parseInt(localStorage.getItem('score'))+1)
                    } else if (parseInt(ball.style.left)>field.clientWidth) {
                        setTimeout(newBall, 300); 
                        field.removeChild(ball);
                    }
                }

                function moveBall() {
                    ball = document.querySelector('#ball')

                    let rad = angle*Math.PI/180
                    let moveX = Math.cos(rad)*BALL_SPEED
                    let moveY = Math.sin(rad)*BALL_SPEED*-1

                    ball.style.top = `${ball.offsetTop+moveY}px`
                    ball.style.left = `${ball.offsetLeft+moveX}px`

                    checkCollision()
                }

                setInterval(moveBall, 20);
                document.field.focus();

            }

            main()

            console.log(`${ball} ${plate.offsetLeft}`)
        </script>
    </body>
    </html>
