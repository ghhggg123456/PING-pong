<!DOCTYPE html>
<html lang="en">
]<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/design/icon.png">
    <title>Store</title>
    <style>
        img, #menu:has(*) {
            max-width: 100%;       /* Не шире контейнера */
            max-height: 70%;       /* Не выше 70% контейнера */
            width: auto;           /* Автоматическая ширина для сохранения пропорций */
            height: auto;  
            height: 80%;
            padding: 2vh;
            border-width: 2px;
            border-color: white;
            border-style: groove;
            background-color: rgb(0, 0, 0);
        }
        aside {
            flex-grow: 1;
            height: 90vh;
        }
        #left {width: max(300px, 5vh);}
        main {overflow-y: auto;}
        #right {
            display: flex;
            width: 95vh; 
            align-items: center;
            justify-content: center;
            object-fit: contain;
        }
        section {width: auto;}
        h1, p {margin: 1%; width: 100%;}
        button {text-align: start;}
        #leave {text-align: center;}
        #menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2vh;
        }
        #app {
            margin: 0% 0%;
            text-align: center;
        }
    </style> 
</head>
<body>
    <aside id="left">
        <header>
            <h1>Store</h1>
            <p>You can get new themes :)</p>
            <p>Your score: <span>?</span>$</p>
        </header>
        <main></main>
        <button id="leave">leave</button>
    </aside>
    <aside id="right">
    <div id="menu"></div>
    </aside>
    <script src="script.js"></script>
    <script>
        const leave = document.getElementById('leave')
        const score = localStorage.getItem('score')
        leave.addEventListener('click', function(){window.location.replace('/index.html')})

        async function main() {
            const response = await fetch('/theme/prices.json');
            const prices = await response.json();
            const list = {};
            Object.keys(prices).forEach((key, index) => {
                const body = document.querySelector('main')
                const button = document.createElement('button')
                body.appendChild(button)
                button.innerHTML = `${key} - ${prices[key]}$`
                if (localStorage.getItem('list')==null) {
                    list[key] = false
                    localStorage.setItem('list', JSON.stringify(list))
                }
                let json = JSON.parse(localStorage.getItem('list'))
                
                button.addEventListener('click', function(){
                    const buttons = body.querySelectorAll('button')
                    buttons.forEach(b => b.classList.remove('selected'))
                    button.classList.toggle('selected')

                    const menu = document.getElementById('menu')
                    const img = document.createElement('img')
                    const app = document.createElement('button')

                    menu.replaceChildren()
                    img.setAttribute('src', `/theme/${key}.gif`)
                    img.setAttribute('alt', key)
                    
                    app.setAttribute('id', 'app')

                    function innerDuck() {
                        if (json[key]==false) {
                            app.textContent = `Buy - ${prices[key]}$`
                            if (parseInt(prices[key])>score) {app.setAttribute('disabled','')} else {
                                app.addEventListener('click', function() {
                                    localStorage.setItem('score', parseInt(localStorage.getItem('score'))-prices[key])
                                    json[key] = true;
                                    localStorage.setItem('list', JSON.stringify(json))
                                })
                            }
                        } else {
                            app.textContent = `Apply`
                            app.addEventListener('click', function() {
                                localStorage.setItem('theme', key)
                            })
                        }
                    }
                    setInterval(innerDuck, 100)


                    menu.appendChild(img)
                    menu.appendChild(document.createElement('br'))
                    menu.appendChild(app)
                    
yayaya
                })
            })
        }
        setInterval(main, 1000);
    </script>

</body>
</html>
