<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./design/icon.png">
    <title>Store</title>
    <style>
        img, #menu:has(*) {
            max-width: 100%;       /* Не шире контейнера */
            max-height: 70%;       /* Не выше 70% контейнера */
            width: auto;           /* Автоматическая ширина для сохранения пропорций */
            height: auto;  
            height: 80%;
            padding: 2vh;
            border-width: 2px;
            border-color: white;
            border-style: groove;
            background-color: rgb(0, 0, 0);
        }
        aside {
            flex-grow: 1;
            height: 90vh;
        }
        #left {width: max(300px, 5vh);}
        main {overflow-y: auto;}
        #right {
            display: flex;
            width: 95vh; 
            align-items: center;
            justify-content: center;
            object-fit: contain;
        }
        section {width: auto;}
        h1, p {margin: 1%; width: 100%;}
        button {text-align: start;}
        #leave {text-align: center;}
        #menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2vh;
        }
        #apply {
            margin: 2vh 0% 0% 0%;
            text-align: center;
        }
    </style> 
</head>
<body>
    <aside id="left">
        <header>
            <h1>Store</h1>
            <p>You can get new themes :)</p>
            <p>Your score: <span>?</span>$</p>
        </header>
        <main></main>
        <button id="leave">leave</button>
    </aside>
    <aside id="right">
    <div id="menu"></div>
    </aside>
    <script src="./script.js"></script>
    <script>
        const leave = document.getElementById('leave')
        const score = localStorage.getItem('score')
        leave.addEventListener('click', function(){window.location.replace('./index.html')})

        async function getPrices() {
            const response = await fetch('./theme/prices.json');
            const prices = await response.json();
            return(prices)
        }

        function getList() {
            const list = localStorage.getItem('list')
            return list
        }

        function menu(targetName, targetPrice) {
            let list = JSON.parse(getList());
            const div = document.querySelector('div#menu')
            

            if (list[targetName]==true) {
                div.innerHTML = `
                <img src="./theme/${targetName}.gif" alt="${targetName}"></img>
                <button id="apply">Apply</button>
                `;
            } else {
                div.innerHTML = `
                <img src="./theme/${targetName}.gif" alt="${targetName}"></img>
                <button id="apply">Buy ${targetPrice}$</button>
                `;
                const btn = document.querySelector('div#menu>button');
                if (targetPrice>parseInt(localStorage.getItem('score'))) {btn.setAttribute('disabled', '')} else {
                    btn.addEventListener('click', function() {
                        localStorage.setItem('score', parseInt(localStorage.getItem('score')-targetPrice))
                        list[targetName] = true;
                        localStorage.setItem('list', JSON.stringify(list))
                        menu(targetName, targetPrice)
                    })
                }
            }

            const btn = document.querySelector('div#menu>button');

            if (btn.textContent == 'Apply') {
                btn.addEventListener('click', function() {
                    localStorage.setItem('theme', targetName)
                })
            }
        }

        function main() {
            getPrices().then(result => {
                const prices = result;
                const list = JSON.parse(getList());

                const main = document.querySelector('main')

                Object.keys(prices).forEach(element => {
                    let button = document.createElement('button')
                    button.textContent = `${element} - ${prices[element]}`
                    button.addEventListener('click', function() {
                        let buttons = document.querySelectorAll('main>button')
                        buttons.forEach(button => {button.classList.remove('selected')})
                        button.classList.toggle('selected')
                        menu(element, prices[element])
                    })
                    main.appendChild(button)
                })
                
                
            });
        }

        main()
        
    </script>
</body>
</html>
